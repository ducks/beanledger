<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/images/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO Meta Tags -->
    <title>BeanLedger - Coffee Roaster Production Planning</title>
    <meta name="description" content="Free, open-source production planning tool for coffee roasters. Plan your roast schedule, manage inventory, and optimize production with BeanLedger." />
    <meta name="keywords" content="coffee roasting, production planning, roaster software, inventory management, coffee business, roast planning" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BeanLedger - Coffee Roaster Production Planning" />
    <meta property="og:description" content="Free, open-source production planning tool for coffee roasters. Plan your roast schedule, manage inventory, and optimize production." />
    <meta property="og:image" content="%sveltekit.assets%/images/bean-ledger-logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BeanLedger - Coffee Roaster Production Planning" />
    <meta name="twitter:description" content="Free, open-source production planning tool for coffee roasters. Plan your roast schedule, manage inventory, and optimize production." />
    <meta name="twitter:image" content="%sveltekit.assets%/images/bean-ledger-logo.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#8B4513" />

    <script>
      // Apply theme before first paint to avoid FOUC
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
